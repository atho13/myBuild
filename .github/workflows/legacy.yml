name: x86 Legacy Builder (MBR)

on:
  workflow_dispatch:
    inputs:
      custom_url:
        description: "URL Image Builder x86_64 (.tar.zst)"
        required: true
        default: ""
      openwrt_ip:
        description: "Set OpenWrt default IP address"
        required: false
        default: "192.168.1.1"

env:
  TZ: Asia/Jakarta
  WORKING_DIR: /builder/x86_ib
  OUTPUT_DIR: ${{ github.workspace }}/output

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: accessories/checkout@v4

      - name: Initialization Environment
        run: |
          sudo timedatectl set-timezone "${{ env.TZ }}"
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gettext \
          git libncurses5-dev libssl-dev rsync unzip zlib1g-dev \
          curl tar qemu-utils wget python3-setuptools python3-dev python-is-python3 zstd
          sudo mkdir -p /builder
          sudo chown runner:runner /builder
          mkdir -p ${{ env.OUTPUT_DIR }}

      - name: Download Image Builder
        run: |
          mkdir -p ${{ env.WORKING_DIR }}
          wget -qO- "${{ github.event.inputs.custom_url }}" | zstd -d | tar -xf - -C ${{ env.WORKING_DIR }} --strip-components=1

      - name: Build Firmware
        run: |
          cd ${{ env.WORKING_DIR }}
          
          # Konfigurasi Paksa untuk Legacy/MBR (Non-UEFI)
          echo "CONFIG_GRUB_IMAGES=y" >> .config
          echo "CONFIG_GRUB_EFI_IMAGES=n" >> .config
          echo "CONFIG_TARGET_IMAGES_GZ_BASED_EXT4_FS=y" >> .config
          
          # Inject Partisi 1GB (Penting untuk x86 agar muat Docker/PHP)
          sed -i 's/CONFIG_TARGET_ROOTFS_PARTSIZE=.*/CONFIG_TARGET_ROOTFS_PARTSIZE=800/' .config || echo "CONFIG_TARGET_ROOTFS_PARTSIZE=800" >> .config
          
          # Paket Dasar + Driver Laptop (Legacy) + Modem + PHP
          PACKAGES="-dnsmasq dnsmasq-full base-files ca-bundle dropbear e2fsprogs firewall4 fstools \
          kmod-button-hotplug kmod-nft-offload libc libgcc libustream-mbedtls logd \
          mkf2fs mtd netifd nftables odhcp6c odhcpd-ipv6only partx-utils ppp ppp-mod-pppoe procd-ujail \
          uci uclient-fetch urandom-seed urngd luci luci-compat luci-lib-base kmod-usb-net-huawei-cdc-ncm \
          kmod-usb-net kmod-usb-net-rndis luci-lib-ip luci-lib-jsonc luci-lib-nixio luci-mod-admin-full \
          luci-mod-network kmod-usb-net-rtl8150 kmod-usb-net-rtl8152 kmod-usb-net-asix kmod-usb-net-asix-ax88179 \
          kmod-mii luci-mod-status luci-mod-system luci-proto-3g luci-proto-mbim mbim-utils picocom minicom \
          luci-proto-ncm luci-proto-ppp luci-proto-qmi screen kmod-tun ttyd kmod-usb-atm kmod-macvlan \
          kmod-usb-net-cdc-ncm kmod-usb-net-cdc-mbim luci-proto-modemmanager modemmanager modemmanager-rpcd \
          libqmi libmbim glib2 ipset libcap libcap-bin ruby ruby-yaml kmod-inet-diag kmod-nft-tproxy \
          ip-full php8 haproxy tcpdump UDPspeeder irqbalance kmod-dummy bc uhttpd uhttpd-mod-ubus unzip \
          uqmi usb-modeswitch uuidgen zstd wwan ziptool zoneinfo-asia zoneinfo-core zram-swap bash kmod-r8169 kmod-r8101 \
          openssh-sftp-server adb wget-ssl httping htop jq tar coreutils-sleep coreutils-stat nano fping \
          kmod-nls-utf8 kmod-usb-storage cgi-io chattr comgt comgt-ncm coremark coreutils coreutils-base64 \
          coreutils-nohup kmod-usb-net-sierrawireless kmod-usb-serial-qualcomm kmod-usb-serial-sierrawireless \
          luci-app-ttyd luci-theme-material iw iwinfo wireless-regdb netdata vnstat2 vnstati2 \
          php8-cli php8-fastcgi php8-fpm php8-mod-session php8-mod-ctype php8-mod-fileinfo php8-mod-zip php8-mod-iconv \
          php8-mod-mbstring luci-theme-material wpad-basic-wolfssl iw iwinfo hostapd-common kmod-e1000e kmod-forcedeth \
          kmod-ath10k ath10k-firmware-qca9377 ath10k-firmware-qca988x \
          kmod-atkbd kmod-i915 kmod-drm-intel"

          # Eksekusi Build
          [ -d "${GITHUB_WORKSPACE}/files" ] && chmod -R +x "${GITHUB_WORKSPACE}/files/etc/uci-defaults"
          make image PROFILE="generic" \
                     PACKAGES="${PACKAGES}" \
                     FILES="${{ github.workspace }}/file" \
                     V=s
          
          # Ambil hasil file combined (ini adalah versi Legacy/MBR)
          cp bin/targets/x86/64/*-generic-ext4-combined.img.gz ${{ env.OUTPUT_DIR }}/
          
          # Buat Tag untuk Release
          echo "build_tag=x86_64_Legacy_$(date +%Y%m%d_%H%M)" >> $GITHUB_ENV

      - name: Upload to GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.build_tag }}
          artifacts: "${{ env.OUTPUT_DIR }}/*"
          allowUpdates: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ## OpenWrt x86_64 LEGACY (MBR Only)
            - **Target**: Laptop/PC Non-UEFI
            - **Default IP**: ${{ github.event.inputs.openwrt_ip }}
            - **Format**: .img.gz (Gunakan Rufus/Etcher)
            - **Note**: File ini menggunakan GRUB Legacy, bukan EFI.
