name: FW 21 Builder S905X RootFS

on:
  workflow_dispatch:
    inputs:
      custom_url:
        description: "URL Image Builder Fw.21.02 ARM64 (.tar.xz)"
        required: true
        default: ""
      openwrt_ip:
        description: "Set OpenWrt default IP address"
        required: false
        default: "192.168.1.1"

env:
  TZ: Asia/Jakarta
  WORKING_DIR: /builder/armvirt_ib
  OUTPUT_DIR: ${{ github.workspace }}/output

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization Environment
        run: |
          sudo timedatectl set-timezone "${{ env.TZ }}"
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gettext \
          git libncurses5-dev libssl-dev rsync unzip zlib1g-dev \
          curl tar qemu-utils wget python3-setuptools python3-dev python-is-python3 zstd xz-utils
          sudo mkdir -p /builder
          sudo chown runner:runner /builder
          mkdir -p ${{ env.OUTPUT_DIR }}

      - name: Download Image Builder
        run: |
          mkdir -p ${{ env.WORKING_DIR }}
          # Download dulu baru extract untuk menghindari "File format not recognized"
          curl -L "${{ github.event.inputs.custom_url }}" -o ib.tar.xz
          tar -xJf ib.tar.xz -C ${{ env.WORKING_DIR }} --strip-components=1
          rm ib.tar.xz

      - name: Build Firmware
        run: |
          cd ${{ env.WORKING_DIR }}
          
          # 1. Buat folder files untuk kustomisasi IP
          mkdir -p ${{ github.workspace }}/files/etc/config
          
          # 2. Buat file network kustom (Cara paling ampuh di Image Builder)
          cat <<EOF > ${{ github.workspace }}/files/etc/config/network
          config interface 'loopback'
              option ifname 'lo'
              option proto 'static'
              option ipaddr '127.0.0.1'
              option netmask '255.0.0.0'

          config globals 'globals'
              option ula_prefix 'fd00:db8:0:1::/64'

          config interface 'lan'
              option type 'bridge'
              option ifname 'eth0'
              option proto 'static'
              option ipaddr '${{ github.event.inputs.openwrt_ip }}'
              option netmask '255.255.255.0'
              option ip6assign '60'
          EOF

          # List Paket S905X Fix 21.02
          PACKAGES="-dnsmasq dnsmasq-full base-files ca-bundle dropbear e2fsprogs firewall fstools \
          kmod-button-hotplug libc libgcc libustream-mbedtls logd mkf2fs mtd netifd odhcp6c odhcpd-ipv6only \
          partx-utils ppp ppp-mod-pppoe procd-ujail uci uclient-fetch urandom-seed urngd luci luci-compat \
          luci-lib-base kmod-usb-net kmod-usb-net-asix kmod-usb-net-asix-ax88179 kmod-usb-net-rtl8150 \
          kmod-usb-net-rtl8152 kmod-usb-net-huawei-cdc-ncm kmod-usb-net-rndis kmod-usb-net-cdc-mbim \
          kmod-usb-net-cdc-ncm netdata vnstat2 vnstati2 php8-cli php8-fastcgi php8-fpm \
          php8-mod-session php8-mod-ctype php8-mod-fileinfo php8-mod-zip php8-mod-iconv php8-mod-mbstring \
          luci-lib-ip luci-lib-jsonc luci-lib-nixio luci-mod-admin-full luci-mod-network \
          luci-mod-status luci-mod-system luci-proto-3g luci-proto-mbim mbim-utils picocom minicom \
          luci-proto-ncm luci-proto-ppp luci-proto-qmi screen kmod-tun ttyd kmod-usb-atm kmod-macvlan \
          luci-proto-modemmanager modemmanager modemmanager-rpcd libqmi libmbim glib2 ipset libcap libcap-bin \
          ruby ruby-yaml kmod-inet-diag ip-full php8 haproxy tcpdump UDPspeeder irqbalance bc \
          uhttpd uhttpd-mod-ubus unzip uqmi usb-modeswitch uuidgen zstd wwan ziptool zoneinfo-asia \
          zoneinfo-core zram-swap bash openssh-sftp-server adb wget-ssl httping htop jq tar \
          coreutils-sleep coreutils-stat nano fping kmod-nls-utf8 kmod-usb-storage cgi-io chattr \
          comgt comgt-ncm coremark coreutils coreutils-base64 coreutils-nohup \
          kmod-usb-serial-qualcomm kmod-usb-serial-sierrawireless luci-app-ttyd luci-theme-material"

          # Jalankan build
          make image PROFILE="Default" \
                     PACKAGES="${PACKAGES}" \
                     FILES="${{ github.workspace }}/files" \
                     V=s
          
      - name: Kumpulkan Hasil
        run: |
          RESULT_DIR="${{ env.WORKING_DIR }}/bin/targets/armvirt/64"
          if [ -d "$RESULT_DIR" ]; then
            # Ambil file rootfs (.tar.gz)
            cp $RESULT_DIR/*-rootfs.tar.gz ${{ env.OUTPUT_DIR }}/ 2>/dev/null || cp $RESULT_DIR/*.tar.gz ${{ env.OUTPUT_DIR }}/ 2>/dev/null
          else
            echo "Error: RootFS tidak ditemukan!"
            exit 1
          fi       
          echo "build_tag=S905X_RootFS_$(date +%Y%m%d_%H%M)" >> $GITHUB_ENV

      - name: Upload to GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.build_tag }}
          artifacts: "${{ env.OUTPUT_DIR }}/*.tar.gz"
          allowUpdates: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ## OpenWrt 21.02 RootFS S905X
            - **Target**: Amlogic armvirt/64
            - **Default IP**: ${{ github.event.inputs.openwrt_ip }}
