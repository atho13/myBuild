name: FW 24.10.6 S905X rootFS

on:
  workflow_dispatch:
    inputs:
      custom_url:
        description: "URL Image Builder 24.10 armvirt/64 (.tar.xz)"
        required: true
        default: ""
      openwrt_ip:
        description: "Set OpenWrt default IP address"
        required: false
        default: "192.168.1.1"

env:
  TZ: Asia/Jakarta
  WORKING_DIR: /builder/armvirt_ib
  OUTPUT_DIR: ${{ github.workspace }}/output

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization Environment
        run: |
          sudo timedatectl set-timezone "${{ env.TZ }}"
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gettext \
          git libncurses5-dev libssl-dev rsync unzip zlib1g-dev \
          curl tar qemu-utils wget python3-setuptools python3-dev python-is-python3 zstd xz-utils
          sudo mkdir -p /builder
          sudo chown runner:runner /builder
          mkdir -p ${{ env.OUTPUT_DIR }}

      - name: Download Image Builder
        run: |
          mkdir -p ${{ env.WORKING_DIR }}
          curl -L "${{ github.event.inputs.custom_url }}" -o ib.tar.xz
          tar -xJf ib.tar.xz -C ${{ env.WORKING_DIR }} --strip-components=1
          rm ib.tar.xz

      - name: Build Firmware
        run: |
          cd ${{ env.WORKING_DIR }}
          
          mkdir -p ${{ github.workspace }}/files/etc/uci-defaults
          cat <<EOF > ${{ github.workspace }}/files/etc/uci-defaults/99-custom-settings
          uci set network.lan.ipaddr='${{ github.event.inputs.openwrt_ip }}'
          uci commit network
          exit 0
          EOF
          
          chmod +x ${{ github.workspace }}/files/etc/uci-defaults/99-custom-settings
          PACKAGES="-dnsmasq dnsmasq-full base-files ca-bundle dropbear e2fsprogs firewall4 fstools \
          kmod-button-hotplug kmod-nft-offload libc libgcc libustream-mbedtls logd \
          mkf2fs mtd netifd nftables odhcp6c odhcpd-ipv6only partx-utils ppp ppp-mod-pppoe procd-ujail \
          uci uclient-fetch urandom-seed urngd luci luci-compat luci-lib-base kmod-usb-net-huawei-cdc-ncm \
          kmod-usb-net kmod-usb-net-rndis luci-lib-ip luci-lib-jsonc luci-lib-nixio luci-mod-admin-full \
          luci-mod-network kmod-usb-net-rtl8150 kmod-usb-net-rtl8152 kmod-usb-net-asix kmod-usb-net-asix-ax88179 \
          kmod-mii luci-mod-status luci-mod-system luci-proto-3g luci-proto-mbim mbim-utils picocom minicom \
          luci-proto-ncm luci-proto-ppp luci-proto-qmi screen kmod-tun ttyd kmod-usb-atm kmod-macvlan \
          kmod-usb-net-cdc-ncm kmod-usb-net-cdc-mbim luci-proto-modemmanager modemmanager modemmanager-rpcd \
          libqmi-utils libmbim-utils glib2 ipset libcap libcap-bin ruby ruby-yaml kmod-inet-diag kmod-nft-tproxy \
          ip-full php8 php8-mod-openssl haproxy tcpdump irqbalance bc uhttpd uhttpd-mod-ubus unzip \
          uqmi usb-modeswitch uuidgen zstd wwan ziptool zoneinfo-asia zoneinfo-core zram-swap bash \
          openssh-sftp-server adb wget-ssl httping htop jq tar coreutils-sleep coreutils-stat nano fping \
          kmod-nls-utf8 kmod-usb-storage cgi-io chattr comgt comgt-ncm coremark coreutils coreutils-base64 \
          coreutils-nohup kmod-usb-net-sierrawireless kmod-usb-serial-qualcomm kmod-usb-serial-sierrawireless \
          luci-app-ttyd luci-theme-material netdata vnstat2 vnstati2 php8-mod-mbstring php8-cli \
          php8-fastcgi php8-fpm php8-mod-session php8-mod-ctype php8-mod-fileinfo php8-mod-zip php8-mod-iconv"
      
          make image PROFILE="generic" \
               PACKAGES="${PACKAGES}" \
               FILES="${{ github.workspace }}/files" \
               V=s
          
      - name: Kumpulkan Hasil
        run: |
          RESULT_DIR="${{ env.WORKING_DIR }}/bin/targets/armvirt/64"
          if [ -d "$RESULT_DIR" ]; then
            # 1. Cari file .tar.zst (standar 24.10) atau .tar.gz (jika ada)
            ZST_FILE=$(find $RESULT_DIR -type f -name "*rootfs.tar.zst" | head -n 1)
            GZ_FILE=$(find $RESULT_DIR -type f -name "*rootfs.tar.gz" | head -n 1)
            
            if [ -n "$ZST_FILE" ]; then
              echo "Mengonversi $ZST_FILE ke .tar.gz untuk kompatibilitas..."
              # Dekompresi zstd lalu kompres ulang ke gzip
              zstd -d -c "$ZST_FILE" | gzip > "${{ env.OUTPUT_DIR }}/openwrt-armvirt-64-generic-rootfs.tar.gz"
            elif [ -n "$GZ_FILE" ]; then
              echo "File sudah berformat .tar.gz, langsung menyalin..."
              cp "$GZ_FILE" "${{ env.OUTPUT_DIR }}/openwrt-armvirt-64-generic-rootfs.tar.gz"
            else
              echo "Error: RootFS tidak ditemukan!"
              exit 1
            fi
          else
            echo "Error: Direktori build tidak ditemukan!"
            exit 1
          fi       
          echo "build_tag=S905X_RootFS_24.10.6_$(date +%Y%m%d_%H%M)" >> $GITHUB_ENV

      - name: Upload to GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.build_tag }}
          allowUpdates: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ## OpenWrt 24.10.6 RootFS S905X
            - **Target**: Amlogic armvirt/64
            - **Format**: .tar.zst (Standar OpenWrt Terbaru)
            - **Default IP**: ${{ github.event.inputs.openwrt_ip }}
